<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Contrato</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:30px;
}

.contenedor{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border:1px solid #ccc;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:8px;
box-sizing:border-box;
}

button,a{
margin-top:20px;
padding:8px 14px;
}

.error{
background:#f8d7da;
padding:10px;
margin-bottom:15px;
color:#842029;
}

</style>

</head>

<body>

<div class="contenedor">

<h1 th:text="${esEdicion} ? 'Editar contrato' : 'Nuevo contrato'"></h1>

<div class="error" th:if="${error}" th:text="${error}"></div>

<form th:action="@{/contratos/guardar}" method="post">

<input type="hidden" name="id" th:value="${contrato.id}"/>

<label>Propiedad</label>

<select name="propiedad.id">

<option value="">Seleccione...</option>

<option
th:each="p : ${propiedades}"
th:value="${p.id}"
th:text="${p.direccion + ' - ' + p.ciudad}"
th:selected="${contrato.propiedad != null && contrato.propiedad.id == p.id}">
</option>

</select>

<label>Inquilino</label>

<select name="inquilino.id">

<option value="">Seleccione...</option>

<option
th:each="i : ${inquilinos}"
th:value="${i.id}"
th:text="${i.nombre + ' ' + i.apellido}"
th:selected="${contrato.inquilino != null && contrato.inquilino.id == i.id}">
</option>

</select>

<label>Fecha inicio</label>

<input
type="date"
name="fechaInicio"
th:value="${contrato.fechaInicio}">

<label>Duración (meses)</label>

<input
type="number"
name="duracionMeses"
th:value="${contrato.duracionMeses}">

<label>Importe mensual</label>

<input
type="number"
step="0.01"
name="importeMensual"
th:value="${contrato.importeMensual}">

<label>Día vencimiento</label>

<input
type="number"
name="diaVencimiento"
th:value="${contrato.diaVencimiento}">

<label>Descripción</label>

<textarea
name="descripcion"
rows="4"
th:text="${contrato.descripcion}">
</textarea>

<label>Estado</label>

<select name="estado">

<option
th:each="e : ${estadosContrato}"
th:value="${e}"
th:text="${e}"
th:selected="${contrato.estado == e}">
</option>

</select>

<button type="submit">

Guardar

</button>

<a th:href="@{/contratos}">

Cancelar

</a>

</form>

</div>

</body>
</html>
