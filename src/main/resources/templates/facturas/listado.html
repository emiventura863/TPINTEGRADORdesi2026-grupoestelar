<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Listado de Facturas</title>
    <link rel="stylesheet" th:href="@{/main.css}"/>
</head>
<body>
<div class="contenedor">
    <h1>Facturas</h1>

    <p th:if="${mensajeOk}" class="mensaje-ok" th:text="${mensajeOk}"></p>
    <p th:if="${error}" class="mensaje-error" th:text="${error}"></p>

    <p>
        <a class="boton" th:href="@{/facturas/nueva}">Nueva factura</a>
    </p>

    <h2>Filtros</h2>
    <form th:action="@{/facturas}" method="get" class="formulario-filtros">
        <label>Contrato:
            <select name="contratoId">
                <option value="">-- Todos --</option>
                <option th:each="c : ${contratos}" th:value="${c.id}"
                        th:text="'Contrato #' + ${c.id}"
                        th:selected="${contratoId != null and contratoId == c.id}"></option>
            </select>
        </label>
        <label>Propiedad:
            <select name="propiedadId">
                <option value="">-- Todas --</option>
                <option th:each="p : ${propiedades}" th:value="${p.id}"
                        th:text="${p.direccion}"
                        th:selected="${propiedadId != null and propiedadId == p.id}"></option>
            </select>
        </label>
        <label>Inquilino:
            <select name="inquilinoId">
                <option value="">-- Todos --</option>
                <option th:each="i : ${inquilinos}" th:value="${i.id}"
                        th:text="${i.nombre + ' ' + i.apellido}"
                        th:selected="${inquilinoId != null and inquilinoId == i.id}"></option>
            </select>
        </label>
        <label>Estado:
            <select name="estado">
                <option value="">-- Todos --</option>
                <option th:each="e : ${estadosFactura}" th:value="${e}"
                        th:text="${e}"
                        th:selected="${estado != null and estado == e}"></option>
            </select>
        </label>
        <label>Vencimiento desde:
            <input type="date" name="fechaVencimientoDesde" th:value="${fechaVencimientoDesde}"/>
        </label>
        <label>Vencimiento hasta:
            <input type="date" name="fechaVencimientoHasta" th:value="${fechaVencimientoHasta}"/>
        </label>
        <button type="submit">Filtrar</button>
        <a class="boton-secundario" th:href="@{/facturas}">Limpiar</a>
    </form>

    <h2>Resultados</h2>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Contrato</th>
            <th>Propiedad</th>
            <th>Inquilino</th>
            <th>Emisión</th>
            <th>Vencimiento</th>
            <th>Importe</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="f : ${facturas}">
            <td th:text="${f.id}"></td>
            <td th:text="'#' + ${f.contrato.id}"></td>
            <td th:text="${f.contrato.propiedad.direccion}"></td>
            <td th:text="${f.contrato.inquilino.nombre + ' ' + f.contrato.inquilino.apellido}"></td>
            <td th:text="${f.fechaEmision}"></td>
            <td th:text="${f.fechaVencimiento}"></td>
            <td th:text="${f.importe}"></td>
            <td th:text="${f.estado}"></td>
            <td class="acciones">
                <a th:href="@{/facturas/{id}/editar(id=${f.id})}">Modificar</a>
                <form th:action="@{/facturas/{id}/eliminar(id=${f.id})}" method="post" class="form-inline"
                      th:if="${f.estado.name() != 'PAGADA'}"
                      onsubmit="return confirm('¿Confirma eliminar esta factura?');">
                    <button type="submit">Eliminar</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(facturas)}">
            <td colspan="9">No hay facturas para mostrar.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
