<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${esEdicion} ? 'Editar Factura' : 'Nueva Factura'">Factura</title>
    <link rel="stylesheet" th:href="@{/main.css}"/>
</head>
<body>
<div class="contenedor">
    <h1 th:text="${esEdicion} ? 'Editar Factura' : 'Alta de Factura'"></h1>

    <p th:if="${error}" class="mensaje-error" th:text="${error}"></p>

    <form th:action="${esEdicion} ? @{/facturas/{id}(id=${factura.id})} : @{/facturas}"
          th:object="${factura}" method="post" class="formulario">

        <div th:if="${esEdicion}">
            <label>ID:</label>
            <input type="text" th:field="*{id}" readonly="readonly"/>
        </div>

        <div th:if="${esEdicion and factura.contrato != null}">
            <label>Contrato asociado:</label>
            <input type="text" readonly="readonly"
                   th:value="'#' + ${factura.contrato.id} + ' - ' + ${factura.contrato.propiedad.direccion}"/>
        </div>

        <div th:unless="${esEdicion}">
            <label>Contrato:</label>
            <select th:field="*{contrato.id}" required="required">
                <option value="">-- Seleccione --</option>
                <option th:each="c : ${contratosActivos}" th:value="${c.id}"
                        th:text="'#' + ${c.id} + ' - ' + ${c.propiedad.direccion} + ' (' + ${c.inquilino.nombre} + ' ' + ${c.inquilino.apellido} + ')'">
                </option>
            </select>
            <span class="error-campo" th:if="${#fields.hasErrors('contrato')}" th:errors="*{contrato}"></span>
        </div>

        <div>
            <label>Concepto facturado:</label>
            <input type="text" th:field="*{conceptoFacturado}" required="required"/>
            <span class="error-campo" th:if="${#fields.hasErrors('conceptoFacturado')}" th:errors="*{conceptoFacturado}"></span>
        </div>

        <div>
            <label>Fecha de emisión:</label>
            <input type="date" th:field="*{fechaEmision}" required="required"/>
            <span class="error-campo" th:if="${#fields.hasErrors('fechaEmision')}" th:errors="*{fechaEmision}"></span>
        </div>

        <div>
            <label>Fecha de vencimiento:</label>
            <input type="date" th:field="*{fechaVencimiento}" required="required"/>
            <span class="error-campo" th:if="${#fields.hasErrors('fechaVencimiento')}" th:errors="*{fechaVencimiento}"></span>
        </div>

        <div>
            <label>Importe:</label>
            <input type="number" step="0.01" min="0.01" th:field="*{importe}" required="required"/>
            <span class="error-campo" th:if="${#fields.hasErrors('importe')}" th:errors="*{importe}"></span>
        </div>

        <div>
            <label>Estado:</label>
            <select th:field="*{estado}">
                <option th:each="e : ${estadosFactura}" th:value="${e}" th:text="${e}"></option>
            </select>
        </div>

        <fieldset class="seccion-pago">
            <legend>Datos de pago (obligatorios solo si el estado es PAGADA)</legend>

            <div>
                <label>Fecha de pago:</label>
                <input type="date" th:field="*{fechaPago}"/>
            </div>

            <div>
                <label>Medio de pago:</label>
                <select th:field="*{medio}">
                    <option value="">-- Sin medio --</option>
                    <option th:each="m : ${mediosPago}" th:value="${m}" th:text="${m}"></option>
                </select>
            </div>

            <div>
                <label>Importe pagado:</label>
                <input type="number" step="0.01" min="0" th:field="*{importePagado}"/>
            </div>

            <div>
                <label>Interés:</label>
                <input type="number" step="0.01" min="0" th:field="*{interes}"/>
            </div>
        </fieldset>

        <div class="acciones-formulario">
            <button type="submit">Guardar</button>
            <a class="boton-secundario" th:href="@{/facturas}">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
