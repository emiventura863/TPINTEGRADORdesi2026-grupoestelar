<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="ISO-8859-1">
    <title>Formulario de PublicaciÃ³n</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

    <div class="starter-template">
        <h1 th:text="${publicacion.id != null} ? 'Modificar PublicaciÃ³n' : 'Alta de PublicaciÃ³n'">Formulario</h1>

        <div th:if="${errorMensaje != null}" style="color: red; margin-bottom: 15px;">
            <p th:text="${errorMensaje}"></p>
        </div>

        <form th:action="@{/publicaciones-web/guardar}" th:object="${publicacion}" method="post">
            <input type="hidden" th:field="*{id}">

            <div style="margin-bottom: 15px;">
                <label>Propiedad:</label>
                <select th:field="*{propiedad.id}" required th:disabled="${publicacion.id != null}">
                    <option value="">-- Seleccione una Propiedad --</option>
                    <option th:each="prop : ${propiedades}"
                            th:value="${prop.id}"
                            th:text="${prop.direccion + ' (' + prop.ciudad + ')'}">
                    </option>
                </select>
                <input type="hidden" th:if="${publicacion.id != null}" th:field="*{propiedad.id}" />
            </div>

            <div style="margin-bottom: 15px;">
                <label>Precio Mensual:</label>
                <input type="number" step="0.01" th:field="*{precioMensual}" required>
            </div>

            <div style="margin-bottom: 15px;">
                <label>Fecha de PublicaciÃ³n:</label>
                <input type="date" th:field="*{fechaPublicacion}" required>
            </div>

            <div style="margin-bottom: 15px;">
                <label>Estado:</label>
                <select th:field="*{estadoPublicacion}" required>
                    <option th:each="estado : ${T(com.example.demo.enums.EstadoPublicacion).values()}"
                            th:value="${estado}"
                            th:text="${estado}">
                    </option>
                </select>
            </div>

            <div style="margin-bottom: 15px;">
                <label>Condiciones de Alquiler:</label><br>
                <textarea th:field="*{condicionesAlquiler}" rows="4" cols="50" required></textarea>
            </div>

            <div style="margin-bottom: 15px;">
                <label>DescripciÃ³n:</label><br>
                <textarea th:field="*{descripcion}" rows="4" cols="50" required></textarea>
            </div>

            <div class="menu">
                <button type="submit" style="padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;">Guardar</button>
                <a th:href="@{/publicaciones-web}" style="background-color: #f44336; margin-top: 10px; width: 210px;">Cancelar</a>
            </div>
        </form>
    </div>

</body>
</html>
