<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="ISO-8859-1">
    <title>Listado de Publicaciones</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

    <div class="starter-template">
        <h1>Gestión de Publicaciones</h1>

        <div class="menu">
            <a th:href="@{/publicaciones-web/nueva}">Dar de alta Publicación</a>
            <a th:href="@{/}">Volver al inicio</a>
        </div>

        <div th:if="${errorMensaje != null}" style="color: red; margin: 10px 0;">
            <p th:text="${errorMensaje}"></p>
        </div>

        <h2>Publicaciones registradas</h2>

        <form th:action="@{/publicaciones-web}" method="get" style="margin-bottom: 20px;">
            <label>Propiedad:</label>
            <select name="propiedad">
                <option value="">Todas</option>
                <option th:each="prop : ${propiedades}" th:value="${prop.id}" th:text="${prop.direccion + ' (' + prop.ciudad + ')'}"></option>
            </select>

            <label style="margin-left: 10px;">Ciudad:</label>
            <input type="text" name="ciudad" />

            <label style="margin-left: 10px;">Estado:</label>
            <select name="estado">
                <option value="">Todos</option>
                <option value="ACTIVA">ACTIVA</option>
                <option value="PAUSADA">PAUSADA</option>
                <option value="FINALIZADA">FINALIZADA</option>
            </select>

            <label style="margin-left: 10px;">Precio mínimo:</label>
            <input type="number" step="0.01" name="precioMin" />

            <label style="margin-left: 10px;">Precio máximo:</label>
            <input type="number" step="0.01" name="precioMax" />

            <button type="submit">Filtrar</button>
        </form>

        <div class="resultados">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Propiedad (Dirección)</th>
                        <th>Precio Mensual</th>
                        <th>Fecha de Publicación</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pub : ${publicaciones}">
                        <td th:text="${pub.id}"></td>
                        <td th:text="${pub.propiedad.direccion + ', ' + pub.propiedad.ciudad}"></td>
                        <td th:text="'$' + ${pub.precioMensual}"></td>
                        <td th:text="${pub.fechaPublicacion}"></td>
                        <td th:text="${pub.estadoPublicacion}"></td>
                        <td>
                            <table class="botones">
                                <tr>
                                    <td>
                                        <form th:action="@{/publicaciones-web/editar/{id}(id=${pub.id})}" method="get">
                                            <input type="submit" value="Modificar">
                                        </form>
                                    </td>
                                    <td>
                                        <form th:action="@{/publicaciones-web/eliminar/{id}(id=${pub.id})}" method="post">
                                            <input type="submit" value="Eliminar" onclick="return confirm('¿Está seguro de eliminar esta publicación?');">
                                        </form>
                                    </td>
                                    <td>
                                        <form th:action="@{/publicaciones-web/{id}/historial(id=${pub.id})}" method="get">
                                            <input type="submit" value="Historial">
                                        </form>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
